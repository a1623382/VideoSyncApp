name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 缓存 Gradle 依赖
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 授予 Gradle 执行权限
      run: chmod +x gradlew

    - name: 生成签名密钥
      run: |
        keytool -genkey -v -keystore app/release-keystore.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias videosync \
          -storepass videosync123 -keypass videosync123 \
          -dname "CN=VideoSync, OU=Dev, O=VideoSync, L=Beijing, ST=Beijing, C=CN"

    - name: 构建 Debug APK
      run: ./gradlew assembleDebug

    - name: 构建 Release APK
      run: ./gradlew assembleRelease

    - name: 重命名 Release APK
      run: |
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/VideoSync-v1.3.0-release.apk

    - name: 上传 Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: 上传 Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: 创建 GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
